# ═══════════════════════════════════════════════════════════════
# Effy v3.9 — Docker Compose
#
# PostgreSQL은 profile 없이 항상 실행 (EFFY는 pm2로 별도 실행).
# EFFY 컨테이너는 profile 지정 시에만 실행.
#
# Usage:
#   docker compose up -d                            # PG만 실행
#   docker compose --profile dev up --build         # PG + EFFY dev
#   docker compose --profile staging up --build     # PG + EFFY staging
#   docker compose --profile production up --build  # PG + EFFY production
# ═══════════════════════════════════════════════════════════════

services:
  # ─── PostgreSQL (항상 실행) ───
  effy-postgres:
    image: pgvector/pgvector:pg15
    container_name: effy-postgres
    ports:
      - "127.0.0.1:5435:5432"
    environment:
      POSTGRES_DB: effy
      POSTGRES_USER: effy
      POSTGRES_PASSWORD: ${DB_PASSWORD:-effy_local_dev}
    volumes:
      - effy-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U effy"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Development ───
  effy-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: effy-dev
    profiles: [dev]
    env_file:
      - .env
    environment:
      NODE_ENV: development
    ports:
      - "3100:3100"
    volumes:
      - ./src:/app/src:ro              # live reload source
      - ./agents:/app/agents:ro        # live reload agents
      - ./effy.config.yaml:/app/effy.config.yaml:ro
      - ./config:/app/config:ro
      - effy-dev-data:/app/data
    restart: unless-stopped

  # ─── Staging ───
  effy-staging:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: effy-staging
    profiles: [staging]
    env_file:
      - .env
    environment:
      NODE_ENV: staging
    ports:
      - "3100:3100"
    volumes:
      - effy-staging-data:/app/data
    restart: unless-stopped

  # ─── Production ───
  effy-prod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: effy-prod
    profiles: [production]
    env_file:
      - .env
    environment:
      NODE_ENV: production
    ports:
      - "3100:3100"
    volumes:
      - effy-prod-data:/app/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M

volumes:
  effy-pg-data:
  effy-dev-data:
  effy-staging-data:
  effy-prod-data:
