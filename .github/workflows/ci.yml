# ═══════════════════════════════════════════════════════════════
# Effy — CI Pipeline
# Triggers: push to develop/main, all PRs
# ═══════════════════════════════════════════════════════════════
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ─── Lint ───
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  # ─── Tier-1: Unit + Security Tests ───
  test-tier1:
    name: Test (Tier-1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run test:tier1

  # ─── Tier-2: Integration Tests ───
  test-tier2:
    name: Test (Tier-2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run test:tier2

  # ─── Config Validation ───
  validate:
    name: Validate Config
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: sk-ant-test
      SLACK_BOT_TOKEN: xoxb-test
      SLACK_APP_TOKEN: xapp-test
      GITHUB_WEBHOOK_SECRET: test-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run validate

  # ─── Docker Build (verify only) ───
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test-tier1, test-tier2]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: effy:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
