# ═══════════════════════════════════════════════════════════════
# Effy v3.9.0 — CI Pipeline
# Triggers: push to develop/main, all PRs
# ═══════════════════════════════════════════════════════════════
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # CI용 더미 환경변수
  ANTHROPIC_API_KEY: sk-ant-ci-dummy
  SLACK_BOT_TOKEN: xoxb-ci-dummy
  SLACK_APP_TOKEN: xapp-ci-dummy
  DISCORD_BOT_TOKEN: dummy
  DATABASE_URL: dummy
  GITHUB_WEBHOOK_SECRET: ci-secret
  KB_API_URL: https://dummy.example.com
  KB_API_TOKEN: dummy
  OPENAI_API_KEY: sk-ci-dummy
  NOTION_API_KEY: ntn-ci-dummy
  GOOGLE_API_KEY: ci-dummy
  TEAMS_APP_ID: ci-dummy
  TEAMS_APP_PASSWORD: ci-dummy

jobs:
  # ─── Validate Config ───
  validate:
    name: Validate Config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: sudo apt-get update && sudo apt-get install -y build-essential python3
      - run: npm install --ignore-scripts=false
      - run: npm run validate

  # ─── Lint ───
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: sudo apt-get update && sudo apt-get install -y build-essential python3
      - run: npm install --ignore-scripts=false
      - run: npm run lint

  # ─── Tier-1: Unit + Security Tests ───
  test-tier1:
    name: Test (Tier-1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: sudo apt-get update && sudo apt-get install -y build-essential python3
      - run: npm install --ignore-scripts=false
      - run: npm run test:tier1

  # ─── Tier-2: Integration Tests ───
  test-tier2:
    name: Test (Tier-2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: sudo apt-get update && sudo apt-get install -y build-essential python3
      - run: npm install --ignore-scripts=false
      - run: npm run test:tier2

  # ─── Docker Build (verify only) ───
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test-tier1, test-tier2]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: effy:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
