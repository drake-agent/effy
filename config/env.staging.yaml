# ═══════════════════════════════════════════════════════════════
# Effy — Staging Environment Overrides
# base config(effy.config.yaml)와 다른 값만 명시.
# Usage: NODE_ENV=staging
# ═══════════════════════════════════════════════════════════════

gateway:
  maxConcurrency:
    global: 10                     # prod 20 → staging 10

memory:
  database:
    sqlitePath: ./data/effy-staging.db

cost:
  monthlyBudgetUsd: 50            # prod 200 → staging 50
  perChannelDailyBudgetUsd: 5     # prod 10 → staging 5

logging:
  level: info
