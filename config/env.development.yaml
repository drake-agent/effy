# ═══════════════════════════════════════════════════════════════
# Effy — Development Environment Overrides
# base config(effy.config.yaml)와 다른 값만 명시.
# Usage: NODE_ENV=development
# ═══════════════════════════════════════════════════════════════

gateway:
  maxConcurrency:
    global: 5                      # prod 20 → dev 5

anthropic:
  advancedModel: claude-haiku-4-5-20251001   # dev에서는 비용 절감 (prod: sonnet)
  maxTokens: 2048                  # prod 4096 → dev 2048

memory:
  database:
    sqlitePath: ./data/effy-dev.db

cost:
  monthlyBudgetUsd: 20            # prod 200 → dev 20
  perChannelDailyBudgetUsd: 2     # prod 10 → dev 2

circuitBreaker:
  errorThreshold: 5               # prod 3 → dev 5 (관대)
  cooldownMs: 60000               # prod 15분 → dev 1분

logging:
  level: debug
